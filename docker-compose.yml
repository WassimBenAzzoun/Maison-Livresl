services:
  app:
    image: library-management-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    ports:
      - "8090:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: library_management
      DB_USER: root
      DB_PASS: root
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.0
    container_name: library_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: library_management
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/db.sql:/docker-entrypoint-initdb.d/1-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: library_phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8091:80"

volumes:
  db_data:
